services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the bundle at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    image: frontend-equipment-maintenance
    ports:
      - "8080:80"
    restart: unless-stopped
